<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Electron STT – Mic ↔ Speaker</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, Helvetica, sans-serif; margin: 0; padding: 1rem; background:#f7f9fc;}
  h1 { margin-top:0; }
  .switches { display:flex; gap:1rem; margin-bottom:0.5rem; }
  .warning { background:#fff3cd; color:#856404; padding:0.5rem 1rem; border-left:4px solid #ffeeba; display:none; margin-bottom:1rem;}
  textarea { width:100%; height:70vh; font-family:monospace; font-size:1rem; resize:none;}
</style>
</head>
<body>
<h1>🗣️ Real‑time Speech‑to‑Text</h1>

<div class="warning" id="warning"></div>

<div class="switches">
  <label><input type="radio" name="src" value="mic"> Microphone</label>
  <label><input type="radio" name="src" value="speaker"> System Speakers</label>
</div>

<textarea id="output" placeholder="Transcribed text will appear here…" readonly></textarea>

<script src="../../node_modules/vosk-browser/dist/vosk.js"></script>
<script src="renderer.js"></script>
</body>
</html>
